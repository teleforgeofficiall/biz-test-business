<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Business — Premium Dental Clinic in Delhi | Trusted Dentist</title>
    <meta name="description" content="Test Business is a top-rated dental clinic in Delhi offering implants, teeth whitening, root canals, and more. Rated 4.5/5. Book your appointment today!">
    <meta name="keywords" content="dental clinic Delhi, dentist Delhi, teeth whitening, dental implants, root canal, braces, oral surgery Delhi">
    <meta name="author" content="Test Business">
    <meta property="og:title" content="Test Business — Premium Dental Clinic in Delhi">
    <meta property="og:description" content="Rated 4.5/5 — Trusted dental care in Delhi. Book your appointment now!">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal-600: #0d9488;
            --teal-500: #14b8a6;
            --teal-700: #0f766e;
            --teal-800: #115e59;
            --teal-50: #f0fdfa;
            --teal-100: #ccfbf1;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --white: #ffffff;
            --gold: #f59e0b;
            --green-500: #22c55e;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--slate-700);
            background: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--slate-900);
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== NAVIGATION ===== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--slate-200);
            transition: all 0.3s ease;
        }

        .nav.scrolled {
            box-shadow: var(--shadow-md);
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--teal-600);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--slate-900);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--slate-600);
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--teal-600);
        }

        .nav-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: var(--teal-600);
            color: var(--white) !important;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 14px rgba(13,148,136,0.4);
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: var(--teal-700);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(13,148,136,0.5);
        }

        .nav-mobile-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .nav-mobile-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--slate-700);
            margin: 6px 0;
            transition: all 0.3s;
            border-radius: 2px;
        }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 72px;
            background: linear-gradient(135deg, var(--teal-50) 0%, var(--white) 50%, var(--slate-50) 100%);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13,148,136,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13,148,136,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            border: 1px solid var(--slate-200);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--slate-700);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        .hero-badge .stars {
            color: var(--gold);
            font-size: 0.95rem;
        }

        .hero-badge .rating-num {
            color: var(--teal-600);
            font-weight: 700;
        }

        .hero-badge .review-count {
            color: var(--slate-400);
            font-weight: 400;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 3.75rem);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero h1 span {
            color: var(--teal-600);
            position: relative;
        }

        .hero h1 span::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            height: 8px;
            background: rgba(13,148,136,0.15);
            border-radius: 4px;
        }

        .hero-text {
            font-size: 1.15rem;
            color: var(--slate-500);
            margin-bottom: 36px;
            max-width: 480px;
            line-height: 1.7;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--teal-600);
            color: var(--white);
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(13,148,136,0.4);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--teal-700);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13,148,136,0.5);
        }

        .btn-primary svg {
            width: 20px;
            height: 20px;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--white);
            color: var(--slate-700);
            border: 2px solid var(--slate-200);
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            border-color: var(--teal-500);
            color: var(--teal-600);
            background: var(--teal-50);
        }

        .hero-stats {
            display: flex;
            gap: 40px;
        }

        .hero-stat {
            text-align: left;
        }

        .hero-stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--teal-600);
        }

        .hero-stat-label {
            font-size: 0.85rem;
            color: var(--slate-400);
            font-weight: 500;
        }

        .hero-visual {
            position: relative;
            animation: fadeInRight 0.8s ease-out 0.2s both;
        }

        .hero-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 520px;
            margin: 0 auto;
        }

        .hero-image-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--teal-100) 0%, var(--teal-50) 100%);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morphBlob 8s ease-in-out infinite;
        }

        .hero-image-center {
            position: absolute;
            inset: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image-center svg {
            width: 200px;
            height: 200px;
            opacity: 0.6;
        }

        .hero-float-card {
            position: absolute;
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px 18px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: float 3s ease-in-out infinite;
        }

        .hero-float-card:nth-child(1) {
            top: 10%;
            right: -10px;
            animation-delay: 0s;
        }

        .hero-float-card:nth-child(2) {
            bottom: 20%;
            left: -20px;
            animation-delay: 1.5s;
        }

        .float-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .float-icon.teal {
            background: var(--teal-100);
            color: var(--teal-600);
        }

        .float-icon.gold {
            background: #fef3c7;
            color: var(--gold);
        }

        .float-icon.green {
            background: #dcfce7;
            color: var(--green-500);
        }

        .float-icon svg {
            width: 20px;
            height: 20px;
        }

        .float-text strong {
            display: block;
            font-size: 0.85rem;
            color: var(--slate-800);
        }

        .float-text span {
            font-size: 0.75rem;
            color: var(--slate-400);
        }

        /* ===== SECTION STYLES ===== */
        .section {
            padding: 100px 0;
        }

        .section-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 60px;
        }

        .section-label {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--teal-600);
            background: var(--teal-50);
            border: 1px solid var(--teal-100);
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: clamp(2rem, 4vw, 2.75rem);
            margin-bottom: 16px;
        }

        .section-header p {
            color: var(--slate-500);
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* ===== REVIEWS ===== */
        .reviews {
            background: var(--slate-50);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .review-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--slate-100);
            transition: all 0.3s ease;
            position: relative;
        }

        .review-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--teal-100);
        }

        .review-card::before {
            content: '"';
            position: absolute;
            top: 20px;
            right: 28px;
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--teal-100);
            line-height: 1;
        }

        .review-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 16px;
        }

        .review-stars svg {
            width: 18px;
            height: 18px;
            fill: var(--gold);
        }

        .review-text {
            font-size: 0.95rem;
            color: var(--slate-600);
            line-height: 1.7;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .review-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .review-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--white);
        }

        .review-avatar.a1 { background: var(--teal-600); }
        .review-avatar.a2 { background: var(--teal-500); }
        .review-avatar.a3 { background: var(--teal-700); }

        .review-author-info strong {
            display: block;
            font-size: 0.9rem;
            color: var(--slate-800);
        }

        .review-author-info span {
            font-size: 0.8rem;
            color: var(--slate-400);
        }

        .review-google {
            position: absolute;
            top: 28px;
            right: 28px;
        }

        .review-google svg {
            width: 24px;
            height: 24px;
        }

        /* ===== SERVICES ===== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .service-card {
            background: var(--white);
            border: 1px solid var(--slate-100);
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: default;
        }

        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--teal-200);
        }

        .service-icon {
            width: 64px;
            height: 64px;
            background: var(--teal-50);
            border: 1px solid var(--teal-100);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            transition: all 0.3s ease;
        }

        .service-card:hover .service-icon {
            background: var(--teal-600);
            border-color: var(--teal-600);
        }

        .service-icon svg {
            width: 32px;
            height: 32px;
            color: var(--teal-600);
            transition: color 0.3s;
        }

        .service-card:hover .service-icon svg {
            color: var(--white);
        }

        .service-card h3 {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--slate-800);
        }

        .service-card p {
            font-size: 0.9rem;
            color: var(--slate-500);
            line-height: 1.6;
        }

        .service-price {
            display: inline-block;
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--teal-600);
            background: var(--teal-50);
            padding: 4px 14px;
            border-radius: 50px;
        }

        /* ===== ABOUT ===== */
        .about {
            background: var(--white);
        }

        .about-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-visual {
            position: relative;
        }

        .about-image {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, var(--teal-100) 0%, var(--teal-50) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .about-image svg {
            width: 120px;
            height: 120px;
            opacity: 0.3;
        }

        .about-exp-badge {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: var(--teal-600);
            color: var(--white);
            border-radius: var(--radius-lg);
            padding: 20px 28px;
            text-align: center;
            box-shadow: var(--shadow-xl);
        }

        .about-exp-badge .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
            line-height: 1;
        }

        .about-exp-badge .label {
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0.9;
        }

        .about-content h2 {
            font-size: clamp(1.75rem, 3.5vw, 2.5rem);
            margin-bottom: 20px;
        }

        .about-content h2 span {
            color: var(--teal-600);
        }

        .about-text {
            color: var(--slate-500);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .about-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .about-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--slate-50);
            border-radius: var(--radius);
        }

        .about-feature svg {
            width: 20px;
            height: 20px;
            color: var(--teal-600);
            flex-shrink: 0;
        }

        .about-feature span {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--slate-700);
        }

        .about-doctor {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--teal-50);
            border-radius: var(--radius);
            border: 1px solid var(--teal-100);
        }

        .about-doctor-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--teal-600);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .about-doctor-avatar svg {
            width: 28px;
            height: 28px;
            color: var(--white);
        }

        .about-doctor-info strong {
            display: block;
            font-size: 0.95rem;
            color: var(--slate-800);
        }

        .about-doctor-info span {
            font-size: 0.8rem;
            color: var(--teal-600);
            font-weight: 500;
        }

        .about-doctor-info small {
            font-size: 0.8rem;
            color: var(--slate-400);
        }

        /* ===== CONTACT ===== */
        .contact {
            background: var(--slate-50);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .contact-card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 24px;
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--slate-100);
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            border-color: var(--teal-200);
            box-shadow: var(--shadow-md);
        }

        .contact-card-icon {
            width: 48px;
            height: 48px;
            background: var(--teal-50);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-card-icon svg {
            width: 24px;
            height: 20px;
            color: var(--teal-600);
        }

        .contact-card-label {
            font-size: 0.8rem;
            color: var(--slate-400);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .contact-card-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--slate-800);
        }

        .contact-card-value a {
            color: var(--teal-600);
        }

        .contact-card-value a:hover {
            text-decoration: underline;
        }

        .contact-form-wrapper {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 36px;
            border: 1px solid var(--slate-100);
            box-shadow: var(--shadow-sm);
        }

        .contact-form-wrapper h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .contact-form-wrapper > p {
            color: var(--slate-400);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--slate-700);
            margin-bottom: 8px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--slate-200);
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--slate-800);
            background: var(--white);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--teal-500);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-submit {
            width: 100%;
            padding: 16px;
            background: var(--teal-600);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .form-submit:hover {
            background: var(--teal-700);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(13,148,136,0.4);
        }

        .form-submit svg {
            width: 20px;
            height: 20px;
        }

        .form-success {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .form-success.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .form-success-icon {
            width: 72px;
            height: 72px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .form-success-icon svg {
            width: 36px;
            height: 36px;
            color: var(--green-500);
        }

        .form-success h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .form-success p {
            color: var(--slate-500);
        }

        /* ===== MAP ===== */
        .map-section {
            padding: 0;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            background: var(--slate-200);
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 14px;
            max-width: 350px;
        }

        .map-overlay-icon {
            width: 44px;
            height: 44px;
            background: var(--teal-600);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .map-overlay-icon svg {
            width: 22px;
            height: 22px;
            color: var(--white);
        }

        .map-overlay-text strong {
            display: block;
            font-size: 0.9rem;
            color: var(--slate-800);
        }

        .map-overlay-text span {
            font-size: 0.8rem;
            color: var(--slate-400);
        }

        /* ===== FOOTER ===== */
        .footer {
            background: var(--slate-900);
            color: var(--slate-400);
            padding: 60px 0 0;
        }

        .footer-top {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1.5fr;
            gap: 48px;
            padding-bottom: 48px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .footer-brand .nav-logo-text {
            color: var(--white);
            margin-bottom: 16px;
            display: block;
        }

        .footer-brand p {
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .footer-social {
            display: flex;
            gap: 12px;
        }

        .footer-social a {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background
